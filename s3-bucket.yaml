AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a secure S3 bucket
  with default settings and logical subfolders.

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - qa
      - stage
      - prod
    Description: Deployment environment

  BucketName:
    Type: String
    Description: Globally unique S3 bucket name

Resources:

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName

      VersioningConfiguration:
        Status: Enabled

      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

      Tags:
        - Key: Environment
          Value: !Ref Environment

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "${S3Bucket.Arn}"
              - !Sub "${S3Bucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  AppFolder:
    Type: AWS::S3::Object
    Properties:
      Bucket: !Ref S3Bucket
      Key: app/

  LogsFolder:
    Type: AWS::S3::Object
    Properties:
      Bucket: !Ref S3Bucket
      Key: logs/

  ArchiveFolder:
    Type: AWS::S3::Object
    Properties:
      Bucket: !Ref S3Bucket
      Key: archive/

Outputs:
  BucketName:
    Description: S3 Bucket Name
    Value: !Ref S3Bucket

  BucketArn:
    Description: S3 Bucket ARN
    Value: !GetAtt S3Bucket.Arn
