name: Deploy S3 Infrastructure name

on:
  push:
    branches:
      - develop
      - qa
      - stage
      - main

permissions:
  id-token: write
  contents: read

jobs:

  deploy:
    runs-on: ubuntu-latest

    env:
      TEMPLATE_FILE: s3-bucket.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "qa" ]]; then
            echo "environment=qa" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "stage" ]]; then
            echo "environment=stage" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Validate CloudFormation Template
        run: |
          aws cloudformation validate-template \
            --template-body file://${{ env.TEMPLATE_FILE }}

      - name: Deploy CloudFormation Stack
        run: |
          ENV=${{ steps.env.outputs.environment }}

          aws cloudformation deploy \
            --template-file ${{ env.TEMPLATE_FILE }} \
            --stack-name s3-${ENV}-stack \
            --parameter-overrides \
              Environment=${ENV} \
              BucketName=my-company-${ENV}-bucket \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Show Stack Outputs
        run: |
          ENV=${{ steps.env.outputs.environment }}

          aws cloudformation describe-stacks \
            --stack-name s3-${ENV}-stack \
            --query "Stacks[0].Outputs"
